<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>シフト管理システム</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

    <style>
        :root {
            --bg-color: #f0f2f5; --accent: #2c3e50; --primary: #3498db; --danger: #e74c3c;
            --color-1: #ffadad; --color-2: #a0c4ff; --color-3: #fdffb6; --color-4: #caffbf; --color-m: #d1d1d1;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; touch-action: manipulation; }
        
        /* ★変更点: スクロールを許可し、高さを柔軟にする */
        body { 
            font-family: -apple-system, sans-serif; 
            background: var(--bg-color); 
            margin: 0; padding: 10px; 
            min-height: 100vh; /* 最低でも画面の高さ */
            display: flex; flex-direction: column; 
            overflow-y: auto; /* 縦スクロールを許可 */
            -webkit-overflow-scrolling: touch;
        }
        
        .registration-form { 
            background: var(--accent); padding: 12px; border-radius: 12px; 
            display: flex; gap: 10px; margin-bottom: 10px; flex-shrink: 0; 
            align-items: center; flex-wrap: wrap; /* 画面が狭い場合は折り返す */
        }
        .registration-form input[type="text"] { flex-grow: 1; min-width: 150px; padding: 12px; font-size: 18px; border-radius: 8px; border: none; outline: none; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* ★ズーム調整スライダーのデザイン */
        .zoom-control {
            display: flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.15); padding: 8px 12px; border-radius: 8px;
            color: white; font-size: 0.9rem; font-weight: bold;
        }
        .zoom-control input[type="range"] { width: 100px; }

        /* ★変更点: 各エリアが潰れないように、最低限の高さを保障（minmaxを使用） */
        .board-container { 
            flex-grow: 1; display: grid; grid-template-columns: 3fr 1fr; gap: 10px; 
            min-height: 700px; /* ボード全体が潰れないための最低の高さ */
        }
        .left-grid { 
            display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: minmax(200px, 2fr) minmax(300px, 3fr); /* 潰れないように最低高さを設定 */
            gap: 10px; 
        }
        .right-grid { 
            display: grid; 
            grid-template-rows: repeat(4, minmax(130px, 1fr)); /* 受付なども潰れないように */
            gap: 10px; 
        }
        #working-col { grid-column: 1 / span 2; }
        
        .column { background: #fff; border: 2px solid #333; border-radius: 6px; display: flex; flex-direction: column; padding: 6px; min-height: 0; }
        .column-header { text-align: center; border-bottom: 1px solid #ccc; margin-bottom: 5px; padding-bottom: 5px; flex-shrink: 0; }
        .column-title { font-size: 1rem; margin: 0; font-weight: bold; }

        .list-group { 
            flex-grow: 1; overflow-y: auto; padding: 2px; 
            -webkit-overflow-scrolling: touch; 
            display: flex; flex-direction: column; gap: 8px;
            min-height: 50px;
        }
        
        .staff-card {
            border: 1px solid #777; border-radius: 12px; padding: 16px 15px; margin: 2px 0;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.12); background: white; 
            min-height: 60px; width: 100%; 
            touch-action: none; user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; 
        }
        
        .staff-name, .timer-display { pointer-events: none; }
        
        .staff-card[data-grade="1年"] { background-color: var(--color-1); }
        .staff-card[data-grade="2年"] { background-color: var(--color-2); }
        .staff-card[data-grade="3年"] { background-color: var(--color-3); }
        .staff-card[data-grade="4年"] { background-color: var(--color-4); }
        .staff-card[data-grade="修士以上"] { background-color: var(--color-m); }
        
        .staff-name { font-weight: bold; font-size: 1.2rem; color: #333; }
        .timer-display { font-family: monospace; font-weight: bold; font-size: 1.2rem; color: #444; background: rgba(255,255,255,0.5); padding: 4px 8px; border-radius: 6px; }
        .no-timer .timer-display { display: none; }
        
        .status-warning { background-color: #ffeb3b !important; border: 2px solid #f39c12 !important; animation: flash 1.5s infinite; }
        @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        /* モーダル */
        #modalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 25px; border-radius: 20px; width: 90%; max-width: 450px; }
        .modal-item { margin-bottom: 15px; display: flex; flex-direction: column; }
        .modal-item label { font-size: 1rem; color: #666; margin-bottom: 6px; font-weight: bold; }
        .modal-item input, .modal-item select, .modal-item textarea { padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 25px; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .btn-delete { background: var(--danger); color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; }
        .btn-close { background: #999; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 16px; }
    </style>
</head>
<body>

<div class="registration-form">
    <input type="text" id="inputName" placeholder="氏名を追加" autocomplete="off">
    <button type="button" class="add-btn" id="addBtn">追加</button>
    <div class="zoom-control">
        <label for="zoomSlider">サイズ調整:</label>
        <input type="range" id="zoomSlider" min="0.6" max="1.3" step="0.05" value="1">
    </div>
</div>

<div class="board-container" id="boardArea">
    <div class="left-grid">
        <div class="column" id="working-col"><div class="column-header"><h2 class="column-title">対応 (2h警告)</h2></div><div id="working" class="list-group" data-timer="true" data-limit="120"></div></div>
        <div class="column no-timer"><div class="column-header"><h2 class="column-title">空き</h2></div><div id="waiting" class="list-group" data-timer="false"></div></div>
        <div class="column"><div class="column-header"><h2 class="column-title">休み (45m警告)</h2></div><div id="break" class="list-group" data-timer="true" data-limit="45"></div></div>
    </div>
    <div class="right-grid">
        <div class="column no-timer"><div class="column-header"><h2 class="column-title">受付</h2></div><div id="reception" class="list-group" data-timer="false"></div></div>
        <div class="column no-timer"><div class="column-header"><h2 class="column-title">KLAS</h2></div><div id="klas" class="list-group" data-timer="false"></div></div>
        <div class="column no-timer"><div class="column-header"><h2 class="column-title">住まい</h2></div><div id="housing" class="list-group" data-timer="false"></div></div>
        <div class="column no-timer"><div class="column-header"><h2 class="column-title">説明会</h2></div><div id="briefing" class="list-group" data-timer="false"></div></div>
    </div>
</div>

<div id="modalOverlay" onclick="if(event.target==this) closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; border-bottom: 2px solid #eee; padding-bottom: 10px;">スタッフ詳細</h3>
        <div class="modal-item"><label>氏名</label><input type="text" id="editName"></div>
        <div class="modal-item">
            <label>学年</label>
            <select id="editGrade">
                <option value="">未設定</option>
                <option value="1年">1年 (赤)</option>
                <option value="2年">2年 (青)</option>
                <option value="3年">3年 (黄)</option>
                <option value="4年">4年 (緑)</option>
                <option value="修士以上">修士以上 (灰)</option>
            </select>
        </div>
        <div class="modal-item"><label>学科</label><input type="text" id="editDept"></div>
        <div class="modal-item"><label>メモ</label><textarea id="editMemo" rows="3"></textarea></div>
        <div class="modal-actions">
            <button class="btn-delete" onclick="deleteStaff()">削除</button>
            <div><button class="btn-close" onclick="closeModal()">戻る</button><button class="btn-save" onclick="saveStaff()">保存</button></div>
        </div>
    </div>
</div>

<script>
    // --- ズーム（表示サイズ）機能 ---
    const zoomSlider = document.getElementById('zoomSlider');
    const boardArea = document.getElementById('boardArea');
    
    // 前回の設定を読み込む
    const savedZoom = localStorage.getItem('boardZoom');
    if(savedZoom) {
        zoomSlider.value = savedZoom;
        boardArea.style.zoom = savedZoom;
    }
    
    // スライダーを動かした時の処理
    zoomSlider.addEventListener('input', (e) => {
        const val = e.target.value;
        boardArea.style.zoom = val;
        localStorage.setItem('boardZoom', val); // 設定を保存
    });

    // --- Firebase設定 ---
    const firebaseConfig = {
        apiKey: "AIzaSyCQl7uzYOTnsNP7qoHHKzOki2xucHp23kU",
        authDomain: "shihuto-31834.firebaseapp.com",
        databaseURL: "https://shihuto-31834-default-rtdb.firebaseio.com/", 
        projectId: "shihuto-31834",
        storageBucket: "shihuto-31834.firebasestorage.app",
        messagingSenderId: "147810720189",
        appId: "1:147810720189:web:89ce7c02637a7b5f65dad4",
        measurementId: "G-BSBR1MSRY6"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database().ref('staff_data');
    let localDataCache = {};
    let currentEditId = null;

    db.on('value', (snapshot) => {
        localDataCache = snapshot.val() || {};
        
        document.querySelectorAll('.staff-card').forEach(card => {
            if (!localDataCache[card.getAttribute('data-id')]) card.remove();
        });

        Object.keys(localDataCache).forEach(id => {
            const staff = localDataCache[id];
            let card = document.querySelector(`.staff-card[data-id="${id}"]`);
            
            if (!card) {
                card = document.createElement('div');
                card.className = 'staff-card';
                card.setAttribute('data-id', id);
                card.innerHTML = `<span class="staff-name"></span><span class="timer-display">00:00</span>`;
                card.onclick = () => openModal(id, localDataCache[id]);
            }
            
            card.querySelector('.staff-name').innerText = staff.name;
            if(staff.grade) card.setAttribute('data-grade', staff.grade);
            else card.removeAttribute('data-grade');
            
            const targetCol = document.getElementById(staff.position) || document.getElementById('waiting');
            if (card.parentElement !== targetCol) {
                targetCol.appendChild(card);
            }
        });

        updateTimers();
    });

    document.getElementById('addBtn').onclick = addStaff;
    function addStaff() {
        const nameInput = document.getElementById('inputName');
        const name = nameInput.value.trim();
        if (!name) return;
        const id = 's' + Date.now();
        db.child(id).set({ name, grade: '', dept: '', memo: '', position: 'waiting', startTime: Date.now() });
        nameInput.value = '';
        nameInput.blur();
    }

    const handleDragEnd = (evt) => {
        const id = evt.item.getAttribute('data-id');
        const newPos = evt.to.id;
        db.child(id).update({ position: newPos, startTime: Date.now() });
    };

    document.querySelectorAll('.list-group').forEach(el => {
        new Sortable(el, {
            group: 'shared', 
            animation: 150, 
            delay: 30,               
            delayOnTouchOnly: true, 
            fallbackTolerance: 15,   
            onEnd: handleDragEnd
        });
    });

    function openModal(id, staff) {
        currentEditId = id;
        document.getElementById('editName').value = staff.name;
        document.getElementById('editGrade').value = staff.grade || '';
        document.getElementById('editDept').value = staff.dept || '';
        document.getElementById('editMemo').value = staff.memo || '';
        document.getElementById('modalOverlay').style.display = 'flex';
    }
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
    function saveStaff() {
        db.child(currentEditId).update({
            name: document.getElementById('editName').value,
            grade: document.getElementById('editGrade').value,
            dept: document.getElementById('editDept').value,
            memo: document.getElementById('editMemo').value
        });
        closeModal();
    }
    function deleteStaff() {
        if(confirm("このスタッフを削除しますか？")) {
            db.child(currentEditId).remove();
            closeModal();
        }
    }

    function updateTimers() {
        const now = Date.now();
        document.querySelectorAll('.staff-card').forEach(card => {
            if (card.classList.contains('sortable-drag') || card.classList.contains('sortable-ghost')) {
                return;
            }

            const id = card.getAttribute('data-id');
            const staff = localDataCache[id];
            if (!staff) return;

            const colEl = card.closest('.list-group');
            if (!colEl) return;

            if (colEl.dataset.timer === "true") {
                const start = staff.startTime || now;
                const elapsedSec = Math.floor((now - start) / 1000);
                const m = Math.floor(elapsedSec / 60);
                const s = elapsedSec % 60;
                
                card.querySelector('.timer-display').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;

                const limit = parseInt(colEl.dataset.limit) || 0;
                if (limit > 0 && m >= limit) {
                    card.classList.add('status-warning');
                } else {
                    card.classList.remove('status-warning');
                }
            } else {
                card.classList.remove('status-warning');
            }
        });
    }

    setInterval(updateTimers, 1000);
</script>
</body>
</html>
